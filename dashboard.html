<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity Research Assistant | Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fira+Code:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"DM Mono"', '"Fira Code"', 'monospace'],
                    },
                    colors: {
                        zinc: {
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #09090b;
            color: #ffffff;
            font-family: 'DM Mono', 'Fira Code', monospace;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #09090b;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SIGNAL_COLORS = {
            "STRONG BUY": { bg: "bg-emerald-500/20", text: "text-emerald-400", border: "border-emerald-500/40", dot: "#10b981" },
            "BUY": { bg: "bg-green-500/15", text: "text-green-400", border: "border-green-500/30", dot: "#4ade80" },
            "NEUTRAL": { bg: "bg-amber-500/15", text: "text-amber-400", border: "border-amber-500/30", dot: "#fbbf24" },
            "SELL": { bg: "bg-red-500/15", text: "text-red-400", border: "border-red-500/30", dot: "#f87171" },
            "STRONG SELL": { bg: "bg-rose-600/20", text: "text-rose-400", border: "border-rose-600/40", dot: "#fb7185" },
        };

        const getSignalColor = (signal) => SIGNAL_COLORS[signal] || SIGNAL_COLORS["NEUTRAL"];

        const rsiColor = (rsi) =>
            rsi >= 70 ? "#ef4444" : rsi >= 55 ? "#10b981" : rsi >= 45 ? "#fbbf24" : rsi >= 30 ? "#f97316" : "#ef4444";

        const ScoreBar = ({ value, color = "#10b981" }) => (
            <div className="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
                <div
                    className="h-full rounded-full transition-all duration-700"
                    style={{ width: `${value}%`, background: color }}
                />
            </div>
        );

        const RSIGauge = ({ value }) => {
            const angle = ((value / 100) * 180) - 90;
            const color = rsiColor(value);
            return (
                <div className="flex flex-col items-center gap-1">
                    <svg width="56" height="30" viewBox="0 0 56 30">
                        <path d="M4 28 A24 24 0 0 1 52 28" fill="none" stroke="#ffffff10" strokeWidth="6" strokeLinecap="round" />
                        <path d="M4 28 A24 24 0 0 1 52 28" fill="none" stroke={color} strokeWidth="6" strokeLinecap="round"
                            strokeDasharray="75.4" strokeDashoffset={75.4 * (1 - value / 100)} />
                        <line x1="28" y1="28" x2={28 + 18 * Math.cos((angle - 90) * Math.PI / 180)}
                            y2={28 + 18 * Math.sin((angle - 90) * Math.PI / 180)}
                            stroke={color} strokeWidth="2" strokeLinecap="round" />
                        <circle cx="28" cy="28" r="3" fill={color} />
                    </svg>
                    <span className="text-[10px] font-bold" style={{ color }}>{value}</span>
                </div>
            );
        };

        const SignalBadge = ({ signal, compact }) => {
            const c = getSignalColor(signal);
            return (
                <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold border ${c.bg} ${c.text} ${c.border}`}>
                    <span className="w-1.5 h-1.5 rounded-full" style={{ background: c.dot }} />
                    {compact ? signal.replace("STRONG ", "S.") : signal}
                </span>
            );
        };

        const Chip = ({ label, value, positive }) => (
            <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-medium
                ${positive === true ? "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" :
                    positive === false ? "bg-red-500/10 text-red-400 border border-red-500/20" :
                        "bg-white/5 text-zinc-400 border border-white/10"}`}>
                {label}: <span className="font-bold">{value}</span>
            </span>
        );

        const SummaryCard = ({ label, count, color, pct, onClick, active }) => (
            <div
                onClick={onClick}
                className={`relative flex-1 p-4 rounded-xl border cursor-pointer transition-all
                  ${active ? "border-opacity-60 scale-[1.02]" : "border-opacity-20 hover:border-opacity-40"}`}
                style={{ borderColor: color, background: `${color}10` }}
            >
                <div className="text-3xl font-black" style={{ color }}>{count}</div>
                <div className="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-wider">{label}</div>
                <div className="mt-2">
                    <ScoreBar value={pct} color={color} />
                </div>
            </div>
        );

        const StockRow = ({ stock, onClick, selected }) => {
            const sc = getSignalColor(stock.signal);
            const up = stock.change_1d >= 0;
            const ind = stock.key_indicators || {};
            return (
                <div
                    onClick={() => onClick(stock)}
                    className={`group relative px-4 py-3 cursor-pointer transition-all duration-200 border-b border-white/5
                        hover:bg-white/5 ${selected ? "bg-white/10 border-l-2" : "border-l-2 border-l-transparent"}
                    `}
                    style={selected ? { borderLeftColor: sc.dot } : {}}
                >
                    <div className="flex items-center gap-3">
                        <div className="w-32 shrink-0">
                            <div className="font-bold text-white text-sm leading-tight">{stock.ticker.split(".")[0]}</div>
                            <div className="text-[10px] text-zinc-500 truncate">{stock.name}</div>
                        </div>
                        <div className="w-24 shrink-0">
                            <SignalBadge signal={stock.signal} compact />
                        </div>
                        <div className="w-20 shrink-0">
                            <div className="flex items-center justify-between mb-0.5">
                                <span className="text-[10px] text-zinc-500">Score</span>
                                <span className="text-[10px] font-bold" style={{ color: sc.dot }}>{stock.composite_score}</span>
                            </div>
                            <ScoreBar value={stock.composite_score} color={sc.dot} />
                        </div>
                        <div className="w-24 shrink-0 text-right">
                            <div className="text-sm font-bold text-white">₹{parseFloat(stock.price).toLocaleString("en-IN")}</div>
                            <div className={`text-[10px] font-semibold ${up ? "text-emerald-400" : "text-red-400"}`}>
                                {up ? "▲" : "▼"} {Math.abs(stock.change_1d).toFixed(2)}%
                            </div>
                        </div>
                        <div className="w-14 shrink-0 flex justify-center">
                            <RSIGauge value={ind.rsi || 50} />
                        </div>
                        <div className="hidden lg:flex flex-wrap gap-1 flex-1">
                            {stock.ai_analysis && (
                                <div className="text-[10px] text-emerald-400 font-bold w-full mb-1">
                                    AI: {stock.ai_analysis.verdict} · <span className="text-zinc-500 font-normal italic">"{stock.ai_analysis.one_liner}"</span>
                                </div>
                            )}
                            <Chip label="MACD" value={ind.macd_crossover?.replace(/_/g, " ")}
                                positive={ind.macd_crossover?.includes("bullish")} />
                            <Chip label="Vol" value={`${ind.volume_ratio}x`} positive={ind.volume_ratio > 1.5} />
                            <Chip label="Trend" value={ind.trend_strength} positive={["strong", "very_strong"].includes(ind.trend_strength)} />
                        </div>
                    </div>
                </div>
            );
        };

        const DetailPanel = ({ stock, onClose }) => {
            if (!stock) return null;
            const sc = getSignalColor(stock.signal);
            const ind = stock.key_indicators || {};
            const up = stock.change_1d >= 0;

            return (
                <div className="h-full flex flex-col bg-zinc-900 border-l border-white/10 overflow-y-auto">
                    <div className="p-5 border-b border-white/10" style={{ background: `${sc.dot}10` }}>
                        <div className="flex items-start justify-between">
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="text-2xl font-black text-white tracking-tight">{stock.ticker.split(".")[0]}</span>
                                    <SignalBadge signal={stock.signal} />
                                </div>
                                <div className="text-xs text-zinc-400">{stock.name}</div>
                            </div>
                            <button onClick={onClose} className="text-zinc-500 hover:text-white text-2xl">&times;</button>
                        </div>
                        <div className="flex items-end gap-4 mt-6">
                            <div>
                                <div className="text-3xl font-black text-white">₹{parseFloat(stock.price).toLocaleString("en-IN")}</div>
                                <div className={`text-xs font-bold ${up ? "text-emerald-400" : "text-red-400"}`}>
                                    {up ? "▲" : "▼"} {Math.abs(stock.change_1d).toFixed(2)}% Today
                                </div>
                            </div>
                            <div className="ml-auto text-right">
                                <div className="text-[10px] text-zinc-600 uppercase">Composite Score</div>
                                <div className="text-4xl font-black" style={{ color: sc.dot }}>{stock.composite_score}</div>
                            </div>
                        </div>
                    </div>

                    <div className="p-5 space-y-6">
                        {stock.ai_analysis && (
                            <div className="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl space-y-3">
                                <div className="flex items-center justify-between">
                                    <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">AI Agent Analysis</span>
                                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${stock.ai_analysis.confidence === 'HIGH' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                                        {stock.ai_analysis.confidence} CONFIDENCE
                                    </span>
                                </div>
                                <div className="text-sm font-bold text-white leading-tight">
                                    "{stock.ai_analysis.one_liner}"
                                </div>
                                <div className="text-xs text-zinc-300 leading-relaxed">
                                    {stock.ai_analysis.reasoning}
                                </div>
                                <div className="grid grid-cols-2 gap-2 pt-2 border-t border-white/5">
                                    <div>
                                        <div className="text-[9px] text-zinc-500 uppercase mb-1">Key Catalyst</div>
                                        <div className="text-[10px] text-emerald-400 font-medium">{stock.ai_analysis.key_catalyst}</div>
                                    </div>
                                    <div>
                                        <div className="text-[9px] text-zinc-500 uppercase mb-1">Key Risk</div>
                                        <div className="text-[10px] text-rose-400 font-medium">{stock.ai_analysis.key_risk}</div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 text-[9px] text-zinc-500 font-bold uppercase">
                                    <span>Horizon: <span className="text-zinc-300">{stock.ai_analysis.time_horizon}</span></span>
                                    <span>Impact: <span className={stock.ai_analysis.news_impact === 'POSITIVE' ? 'text-emerald-400' : 'text-rose-400'}>{stock.ai_analysis.news_impact}</span></span>
                                </div>
                            </div>
                        )}

                        <div>
                            <div className="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-3">Key Indicators</div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="p-2 bg-white/5 rounded border border-white/5">
                                    <div className="text-[10px] text-zinc-500 mb-1">RSI (14)</div>
                                    <div className="text-sm font-bold" style={{ color: rsiColor(ind.rsi) }}>{ind.rsi}</div>
                                </div>
                                <div className="p-2 bg-white/5 rounded border border-white/5">
                                    <div className="text-[10px] text-zinc-500 mb-1">ADX (Trend)</div>
                                    <div className="text-sm font-bold text-amber-400">{ind.adx} ({ind.trend_strength})</div>
                                </div>
                                <div className="p-2 bg-white/5 rounded border border-white/5">
                                    <div className="text-[10px] text-zinc-500 mb-1">MACD</div>
                                    <div className="text-[10px] font-bold text-zinc-300 capitalize">{ind.macd_crossover?.replace(/_/g, " ")}</div>
                                </div>
                                <div className="p-2 bg-white/5 rounded border border-white/5">
                                    <div className="text-[10px] text-zinc-500 mb-1">SuperTrend</div>
                                    <div className={`text-sm font-bold ${ind.supertrend === "bullish" ? "text-emerald-400" : "text-rose-400"}`}>{ind.supertrend}</div>
                                </div>
                            </div>
                        </div>

                        {stock.reasons && stock.reasons.length > 0 && (
                            <div>
                                <div className="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-3 text-emerald-500/80">Bullish Reasons</div>
                                <ul className="space-y-2">
                                    {stock.reasons.map((r, i) => (
                                        <li key={i} className="flex gap-2 text-xs text-zinc-300">
                                            <span className="text-emerald-400">✓</span> {r}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        {stock.risks && stock.risks.length > 0 && (
                            <div>
                                <div className="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-3 text-rose-500/80">Risk Factors</div>
                                <ul className="space-y-2">
                                    {stock.risks.map((r, i) => (
                                        <li key={i} className="flex gap-2 text-xs text-zinc-400">
                                            <span className="text-rose-400">⚡</span> {r}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        <div>
                            <div className="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-3">Pivot Points</div>
                            <div className="grid grid-cols-2 gap-2 text-[10px]">
                                <div className="flex justify-between p-1.5 bg-rose-500/5 text-rose-300 rounded"><span>S2</span> <span>{stock.price_levels?.s2}</span></div>
                                <div className="flex justify-between p-1.5 bg-rose-500/10 text-rose-400 rounded font-bold"><span>S1</span> <span>{stock.price_levels?.s1}</span></div>
                                <div className="flex justify-between p-1.5 bg-emerald-500/10 text-emerald-400 rounded font-bold"><span>R1</span> <span>{stock.price_levels?.r1}</span></div>
                                <div className="flex justify-between p-1.5 bg-emerald-500/5 text-emerald-300 rounded"><span>R2</span> <span>{stock.price_levels?.r2}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filter, setFilter] = useState("ALL");
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState("");
            const [sort, setSort] = useState("score");

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch("/api/latest");
                    if (!res.ok) throw new Error("Failed to fetch reports. Please run the analysis.");
                    const json = await res.json();
                    setData(json);
                    setError(null);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 300000); // 5 mins
                return () => clearInterval(interval);
            }, []);

            if (loading && !data) return (
                <div className="h-screen flex items-center justify-center">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
                        <div className="text-emerald-500 font-bold animate-pulse text-xs tracking-widest uppercase">Fetching Latest Report...</div>
                    </div>
                </div>
            );

            if (error && !data) return (
                <div className="h-screen flex items-center justify-center p-6">
                    <div className="max-w-md w-full bg-zinc-900 border border-rose-500/30 p-8 rounded-2xl text-center">
                        <div className="text-4xl mb-4">⚠️</div>
                        <h2 className="text-xl font-bold text-white mb-2">Analysis Needed</h2>
                        <p className="text-zinc-400 text-sm mb-6">{error}</p>
                        <button onClick={fetchData} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold transition-all">Retry Fetch</button>
                    </div>
                </div>
            );

            const results = data?.all_results || [];
            const summary = data?.summary || { strong_buys: 0, buys: 0, neutrals: 0, sells: 0 };
            const total = results.length;

            const filtered = results
                .filter(r => filter === "ALL" || r.signal === filter || (filter === "SELL" && r.signal === "STRONG SELL"))
                .filter(r => !search || r.ticker.toLowerCase().includes(search.toLowerCase()) || r.name.toLowerCase().includes(search.toLowerCase()))
                .sort((a, b) => {
                    if (sort === "score") return b.composite_score - a.composite_score;
                    if (sort === "change") return b.change_1d - a.change_1d;
                    return a.ticker.localeCompare(b.ticker);
                });

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <div className="h-14 shrink-0 flex items-center justify-between px-6 border-b border-white/10 bg-zinc-900/50 backdrop-blur sticky top-0 z-20">
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                <span className="font-black text-white tracking-tighter text-sm uppercase">Stock Research Assistant</span>
                            </div>
                            <div className="h-4 w-px bg-white/10 hidden sm:block"></div>
                            <div className="text-[10px] text-zinc-500 hidden sm:block uppercase tracking-wider">
                                {data?.date} · {data?.time}
                            </div>
                        </div>
                        <button onClick={fetchData} className="group flex items-center gap-2 px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 border border-white/5 transition-all">
                            <span className="text-emerald-500 group-hover:rotate-180 transition-transform duration-500 text-sm">↻</span>
                            <span className="text-[10px] font-bold text-zinc-300">REFRESH</span>
                        </button>
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                        {/* List Area */}
                        <div className={`flex-1 flex flex-col min-w-0 ${selected ? 'hidden lg:flex' : 'flex'}`}>
                            {/* Summary Stats */}
                            <div className="p-4 grid grid-cols-2 md:grid-cols-4 gap-3 bg-zinc-900/30 border-b border-white/5">
                                <SummaryCard label="Strong Buy" count={summary.strong_buys} color="#10b981" pct={summary.strong_buys / total * 100}
                                    onClick={() => setFilter(filter === "STRONG BUY" ? "ALL" : "STRONG BUY")} active={filter === "STRONG BUY"} />
                                <SummaryCard label="Buy" count={summary.buys} color="#4ade80" pct={summary.buys / total * 100}
                                    onClick={() => setFilter(filter === "BUY" ? "ALL" : "BUY")} active={filter === "BUY"} />
                                <SummaryCard label="Neutral" count={summary.neutrals} color="#fbbf24" pct={summary.neutrals / total * 100}
                                    onClick={() => setFilter(filter === "NEUTRAL" ? "ALL" : "NEUTRAL")} active={filter === "NEUTRAL"} />
                                <SummaryCard label="Sell / Avoid" count={summary.sells} color="#ef4444" pct={summary.sells / total * 100}
                                    onClick={() => setFilter(filter === "SELL" ? "ALL" : "SELL")} active={filter === "SELL"} />
                            </div>

                            {/* Filters & Sorting */}
                            <div className="p-3 flex items-center gap-3 bg-zinc-900/80 border-b border-white/5">
                                <div className="relative flex-1">
                                    <input
                                        type="text"
                                        placeholder="SEARCH TICKER OR COMPANY..."
                                        className="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-[10px] text-zinc-200 placeholder-zinc-700 outline-none focus:border-emerald-500/50"
                                        value={search}
                                        onChange={e => setSearch(e.target.value)}
                                    />
                                </div>
                                <div className="flex gap-1">
                                    {["score", "change", "name"].map(s => (
                                        <button key={s} onClick={() => setSort(s)}
                                            className={`px-3 py-2 rounded text-[10px] font-bold border transition-all ${sort === s ? 'bg-emerald-500/20 border-emerald-500/40 text-emerald-400' : 'bg-white/5 border-white/5 text-zinc-600 hover:text-zinc-400'}`}>
                                            {s === "score" ? "SCORE ↓" : s === "change" ? "1D% ↓" : "A-Z"}
                                        </button>
                                    ))}
                                </div>
                                <div className="text-[10px] text-zinc-700 font-bold ml-2">{filtered.length} RESULTS</div>
                            </div>

                            {/* Table Header */}
                            <div className="flex items-center gap-3 px-4 py-2 bg-black border-b border-white/10">
                                <div className="w-32 text-[10px] font-bold text-zinc-600 uppercase">Stock</div>
                                <div className="w-24 text-[10px] font-bold text-zinc-600 uppercase">Signal</div>
                                <div className="w-20 text-[10px] font-bold text-zinc-600 uppercase">Score</div>
                                <div className="w-24 text-[10px] font-bold text-zinc-600 uppercase text-right">Price</div>
                                <div className="w-14 text-[10px] font-bold text-zinc-600 uppercase text-center">RSI</div>
                                <div className="hidden lg:block flex-1 text-[10px] font-bold text-zinc-600 uppercase">Indicators</div>
                            </div>

                            {/* List Container */}
                            <div className="flex-1 overflow-y-auto bg-black/20">
                                {filtered.length > 0 ? filtered.map(stock => (
                                    <StockRow key={stock.ticker} stock={stock} onClick={setSelected} selected={selected?.ticker === stock.ticker} />
                                )) : (
                                    <div className="p-20 text-center text-zinc-700 text-xs font-bold tracking-widest">NO MATCHING DATA</div>
                                )}
                            </div>
                        </div>

                        {/* Detail Area */}
                        {selected && (
                            <div className="w-full lg:w-96 shrink-0 z-30 lg:static absolute inset-0 bg-black/50 lg:bg-transparent">
                                <DetailPanel stock={selected} onClose={() => setSelected(null)} />
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <div className="h-8 shrink-0 flex items-center justify-between px-4 border-t border-white/5 bg-zinc-950 text-[9px] text-zinc-700 font-medium">
                        <div>DATA: YAHOO FINANCE &bull; REFRESH: 5 MINS</div>
                        <div className="flex gap-4">
                            <span>TOTAL ANALYZED: {total}</span>
                            <span className="text-emerald-900">SYSTEM: ACTIVE</span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
